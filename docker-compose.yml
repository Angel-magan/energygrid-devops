services:
  # Database: PostgreSQL
  eg-db:
    image: postgres:15-alpine
    container_name: eg-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - eg_db_data:/var/lib/postgresql/data
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energygrid_network

  # Backend: Node.js (Escalable)
  eg-backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      eg-db:
        condition: service_healthy
    # CAMBIO PARA APLICAR EL ESCALAMIENTO:
    # No mapeamos el puerto 3000 hacia afuera directamente para evitar colisiones.
    # Si se accede desde afuera, Docker asignará puertos aleatorios o usaremos un balanceador.
    expose:
      - "3000"
    deploy:
      replicas: 1 # Valor por defecto, lo subiremos por comando cuando haya "caos" de energía
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@eg-db:5432/${DB_NAME}
      PORT: 3000
    networks:
      - energygrid_network
  # Auth Database: PostgreSQL separado para usuarios y roles
  eg-auth-db:
    image: postgres:15-alpine
    container_name: eg-auth-db
    restart: always
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - eg_auth_db_data:/var/lib/postgresql/data
      - ./infrastructure/auth-database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energygrid_network

  # Auth Service: Login, JWT y RBAC
  eg-auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: eg-auth-service
    restart: unless-stopped
    depends_on:
      eg-auth-db:
        condition: service_healthy
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    environment:
      AUTH_DATABASE_URL: postgres://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@eg-auth-db:5432/${AUTH_DB_NAME}
      AUTH_PORT: ${AUTH_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      NODE_ENV: ${NODE_ENV}
      FRONTEND_URL: http://localhost:5173
    networks:
      - energygrid_network

  # Simulator: Python (IoT Telemetry)
  eg-simulator:
    build:
      context: ./apps/simulator
      dockerfile: Dockerfile
    container_name: eg-simulator
    restart: always
    depends_on:
      - eg-backend
    environment:
      BACKEND_URL: http://eg-backend:3000
    networks:
      - energygrid_network

  # Frontend: React + Vite
  eg-frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://44.223.2.142:3000/api
        - VITE_AUTH_API_URL=http://44.223.2.142:3000/api
      target: builder
    depends_on:
      - eg-gateway
    container_name: eg-frontend
    ports:
      - "5173:5173"

    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

    environment:
      CHOKIDAR_USEPOLLING: "true"

    command: npm run dev -- --host

    networks:
      - energygrid_network

  # NUEVO SERVICIO: Balanceador de Carga para el Backend
  eg-gateway:
    image: nginx:alpine
    container_name: eg-gateway
    ports:
      - "3000:3000"
    depends_on:
      - eg-backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - energygrid_network

networks:
  energygrid_network:
    driver: bridge

volumes:
  eg_db_data:
  eg_auth_db_data:
