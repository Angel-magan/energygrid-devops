events { worker_connections 1024; }

http {
    # Formato de log combinado con la IP real del cliente
    log_format combined_realip '$remote_addr - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log combined_realip;
    error_log /var/log/nginx/error.log;

    upstream backend_servers {
        server eg-backend:3000;
    }

    upstream auth_servers {
        server eg-auth-service:3001;
    }

    server {
        listen 3000;

        location /api/auth/ {
            proxy_pass http://auth_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}